{% extends "base.html" %}

{% block title %}Đăng nhập - DATA AP OB{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-24 bg-white rounded-xl shadow-lg overflow-hidden p-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-4">Đăng nhập</h1>
    <p class="text-gray-600 mb-6">Đăng nhập để truy cập hệ thống quản lý dữ liệu.</p>
    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Tên đăng nhập</label>
            <input type="text" name="username" required autofocus
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Mật khẩu</label>
            <input type="password" name="password" required
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
        </div>
        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-3 rounded-lg font-medium transition">
            Đăng nhập
        </button>
    </form>
</div>
{% endblock %}
